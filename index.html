<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP World Trainer</title>

<style>
body {
  font-family: -apple-system;
  margin: 0;
  background: linear-gradient(135deg, #58cc02, #007AFF);
  color: #333;
}

.screen { display: none; padding: 20px; text-align: center; }
.active { display: block; }

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

.primary { background: #58cc02; color: white; }
.secondary { background: #007AFF; color: white; }

.correct { background: #58cc02 !important; color: white; }
.wrong { background: #ff4b4b !important; color: white; }

.flashcard {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  border-radius: 20px;
  background: white;
}

.progress-bar {
  height: 8px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress { height: 100%; background: #58cc02; width: 0%; }

.top-bar {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">
    <h1>🌍 AP World Trainer</h1>
    <button class="primary" onclick="startQuiz()">Quiz</button>
    <button class="secondary" onclick="showScreen('flashcards')">Flashcards</button>
    <button onclick="showScreen('dbq')">DBQ Practice</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="top-bar">
    <div id="xp">XP: 0</div>
    <div id="streak">🔥 0</div>
  </div>

  <div class="progress-bar"><div id="progress" class="progress"></div></div>

  <div class="card">
    <h3 id="question"></h3>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()" style="display:none">Next</button>
  </div>
</div>

<!-- FLASHCARDS -->
<div id="flashcards" class="screen">
  <div class="card">
    <h2>Flashcards</h2>
    <div id="card" class="flashcard">Loading...</div>
    <p>Tap to flip • Swipe to next</p>
    <button onclick="showScreen('home')">Back</button>
  </div>
</div>

<!-- DBQ -->
<div id="dbq" class="screen">
  <div class="card">
    <h2>DBQ Practice</h2>
    <p>Explain ONE cause of the Industrial Revolution.</p>
    <textarea id="dbqInput"></textarea>
    <button class="primary" onclick="gradeDBQ()">Submit</button>
    <p id="dbqFeedback"></p>
    <button onclick="showScreen('home')">Back</button>
  </div>
</div>

<script>
// ---------- DATA ----------
const templates = {
  trade: [
    ["Which network connected Afro-Eurasia?", ["Silk Road","Atlantic","Pacific","None"], 0],
    ["What was traded in Indian Ocean routes?", ["Spices","Cars","Coal","Oil"], 0]
  ],
  revolutions: [
    ["Which revolution used Enlightenment ideas?", ["French","Neolithic","Green","Agricultural"], 0],
    ["What idea spread in revolutions?", ["Natural rights","Feudalism","Isolation","Monarchy"], 0]
  ],
  empires: [
    ["Which empire used gunpowder?", ["Ottoman","Maya","Inca","Olmec"], 0],
    ["Who ruled Mughal Empire?", ["Akbar","Napoleon","Caesar","Qin"], 0]
  ],
  industry: [
    ["What powered factories?", ["Steam","Solar","Wind","Water"], 0],
    ["Where did industrialization start?", ["Britain","China","India","Japan"], 0]
  ]
};

// ---------- STATE ----------
let xp = localStorage.getItem("xp") || 0;
let streak = localStorage.getItem("streak") || 0;
let lastDate = localStorage.getItem("lastDate");

let mastery = JSON.parse(localStorage.getItem("mastery")) || {
  trade:0, revolutions:0, empires:0, industry:0
};

let currentQ = null;
let currentIndex = 0;
let answered = false;

// ---------- NAV ----------
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ---------- QUIZ ----------
function startQuiz(){
  updateStreak();
  nextQuestion();
  showScreen("quiz");
}

function generateQuestion(){
  let topic = Object.keys(mastery).sort((a,b)=>mastery[a]-mastery[b])[0];
  let base = templates[topic][Math.floor(Math.random()*templates[topic].length)];

  let answers = [...base[1]];
  answers.sort(()=>Math.random()-0.5);

  return {
    topic,
    q: base[0],
    a: answers,
    correct: answers.indexOf(base[1][base[2]])
  };
}

function loadQuestion(){
  answered = false;
  document.getElementById("nextBtn").style.display="none";

  currentQ = generateQuestion();
  document.getElementById("question").innerText = currentQ.q;

  let div = document.getElementById("answers");
  div.innerHTML="";

  currentQ.a.forEach((ans,i)=>{
    let btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick=()=>checkAnswer(btn,i);
    div.appendChild(btn);
  });

  updateUI();
}

function checkAnswer(btn,i){
  if(answered) return;
  answered = true;

  let buttons = document.querySelectorAll("#answers button");

  buttons.forEach((b,idx)=>{
    if(idx===currentQ.correct) b.classList.add("correct");
    else if(idx===i) b.classList.add("wrong");
  });

  let correct = i===currentQ.correct;

  mastery[currentQ.topic]+= correct?1:-1;
  localStorage.setItem("mastery", JSON.stringify(mastery));

  if(correct){
    xp++;
    navigator.vibrate(50);
  }

  localStorage.setItem("xp",xp);

  document.getElementById("nextBtn").style.display="block";
}

function nextQuestion(){
  currentIndex++;
  loadQuestion();
}

function updateUI(){
  document.getElementById("xp").innerText="XP: "+xp;
  document.getElementById("streak").innerText="🔥 "+streak;
}

// ---------- STREAK ----------
function updateStreak(){
  let today = new Date().toDateString();
  if(lastDate!==today){
    streak++;
    localStorage.setItem("streak",streak);
    localStorage.setItem("lastDate",today);
  }
}

// ---------- FLASHCARDS ----------
const cards = [
  {front:"Silk Road", back:"Trade route across Eurasia"},
  {front:"Industrial Revolution", back:"Shift to factories"},
  {front:"Enlightenment", back:"Ideas of rights and reason"}
];

let cIndex=0, flipped=false;

function loadCard(){
  document.getElementById("card").innerText=
    flipped?cards[cIndex].back:cards[cIndex].front;
}

document.getElementById("card").onclick=()=>{
  flipped=!flipped; loadCard();
};

let startX=0;
document.getElementById("card").addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});
document.getElementById("card").addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(Math.abs(diff)>50){
    cIndex=(cIndex+1)%cards.length;
    flipped=false;
    loadCard();
  }
});

loadCard();

// ---------- DBQ ----------
function gradeDBQ(){
  let text=document.getElementById("dbqInput").value.toLowerCase();
  let score=0, feedback=[];

  if(text.length>80){score++;feedback.push("Good detail");}
  if(text.includes("because")){score++;feedback.push("Reasoning present");}
  if(text.includes("factory")){score++;feedback.push("Evidence used");}
  if(text.includes("however")){score++;feedback.push("Complex thinking");}

  document.getElementById("dbqFeedback").innerText=
    "Score: "+score+"/4 | "+feedback.join(", ");
}
</script>

</body>
</html>
