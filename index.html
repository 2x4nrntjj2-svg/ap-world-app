<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP World Trainer</title>

<style>
body {
  font-family: -apple-system;
  margin: 0;
  background: linear-gradient(135deg, #58cc02, #007AFF);
}

.screen { display: none; padding: 20px; text-align: center; }
.active { display: block; }

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

.primary { background: #58cc02; color: white; }
.secondary { background: #007AFF; color: white; }

.correct { background: #58cc02 !important; color: white; }
.wrong { background: #ff4b4b !important; color: white; }

#nextBtn {
  display: none;
  margin-top: 15px;
}

.flashcard {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  border-radius: 20px;
  background: white;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">
    <h1>🌍 AP World Trainer</h1>
    <button class="primary" onclick="startQuiz()">Quiz</button>
    <button class="secondary" onclick="showScreen('flashcards')">Flashcards</button>
    <button onclick="showScreen('dbq')">DBQ Practice</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="top-bar">
    <div id="xp">XP: 0</div>
    <div id="streak">🔥 0</div>
  </div>

  <div class="card">
    <h3 id="question"></h3>
    <div id="answers"></div>
    <button id="nextBtn" class="secondary">Next →</button>
  </div>
</div>

<!-- FLASHCARDS -->
<div id="flashcards" class="screen">
  <div class="card">
    <h2>Flashcards</h2>
    <div id="card" class="flashcard">Loading...</div>
    <p>Tap to flip • Swipe to next</p>
    <button onclick="showScreen('home')">Back</button>
  </div>
</div>

<!-- DBQ -->
<div id="dbq" class="screen">
  <div class="card">
    <h2>DBQ Practice</h2>
    <p>Explain ONE cause of the Industrial Revolution.</p>
    <textarea id="dbqInput"></textarea>
    <button class="primary" onclick="gradeDBQ()">Submit</button>
    <p id="dbqFeedback"></p>
    <button onclick="showScreen('home')">Back</button>
  </div>
</div>

<script>

/* =========================
   STATE
========================= */
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate");

let mastery = JSON.parse(localStorage.getItem("mastery")) || {
  trade:0,
  revolutions:0,
  empires:0,
  industry:0
};

let currentQ = null;
let answered = false;

/* =========================
   NAV
========================= */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* =========================
   QUIZ DATA
========================= */
const templates = {
  trade: [
    ["Silk Road connected?", ["Asia-Europe","Africa-America","Pacific","None"], 0],
    ["Indian Ocean trade involved?", ["Spices","Cars","Coal","Oil"], 0]
  ],
  revolutions: [
    ["Which used Enlightenment ideas?", ["French","Neolithic","Green","Agricultural"], 0]
  ],
  empires: [
    ["Gunpowder empire?", ["Ottoman","Maya","Inca","Olmec"], 0]
  ],
  industry: [
    ["Industrialization began in?", ["Britain","China","India","Japan"], 0]
  ]
};

/* =========================
   QUIZ ENGINE
========================= */
function startQuiz(){
  updateStreak();
  loadQuestion();
  showScreen("quiz");
}

function generateQuestion(){
  let topic = Object.keys(mastery).sort((a,b)=>mastery[a]-mastery[b])[0];
  let base = templates[topic][Math.floor(Math.random()*templates[topic].length)];

  let answers = [...base[1]];
  answers.sort(()=>Math.random()-0.5);

  return {
    topic,
    q: base[0],
    a: answers,
    correct: answers.indexOf(base[1][base[2]])
  };
}

function loadQuestion(){
  answered = false;
  document.getElementById("nextBtn").style.display="none";

  currentQ = generateQuestion();

  document.getElementById("question").innerText = currentQ.q;

  let div = document.getElementById("answers");
  div.innerHTML="";

  currentQ.a.forEach((ans,i)=>{
    let btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick=()=>checkAnswer(i);
    div.appendChild(btn);
  });
}

function checkAnswer(i){
  if(answered) return;
  answered = true;

  let buttons = document.querySelectorAll("#answers button");

  buttons.forEach((b,idx)=>{
    if(idx===currentQ.correct) b.classList.add("correct");
    else if(idx===i) b.classList.add("wrong");
  });

  let correct = i===currentQ.correct;

  mastery[currentQ.topic] += correct ? 1 : -1;
  localStorage.setItem("mastery", JSON.stringify(mastery));

  if(correct){
    xp++;
    localStorage.setItem("xp", xp);
    document.getElementById("xp").innerText = "XP: " + xp;
  }

  document.getElementById("nextBtn").style.display="block";
}

document.getElementById("nextBtn").onclick = loadQuestion;

/* =========================
   STREAK
========================= */
function updateStreak(){
  let today = new Date().toDateString();

  if(lastDate !== today){
    streak++;
    lastDate = today;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDate", today);
  }

  document.getElementById("streak").innerText = "🔥 " + streak;
}

/* =========================
   FLASHCARDS (100 REAL ONES)
========================= */
const cards = [
{front:"Silk Road", back:"Trade route across Eurasia"},
{front:"Indian Ocean Trade", back:"Maritime trade linking Africa, Asia, Middle East"},
{front:"Trans-Saharan Trade", back:"Camel trade across Sahara (gold/salt)"},
{front:"Mansa Musa", back:"Wealthy ruler of Mali Empire"},
{front:"Feudalism", back:"Land-based political system in medieval Europe"},
{front:"Mandate of Heaven", back:"Chinese belief in divine right to rule"},
{front:"Ottoman Empire", back:"Gunpowder empire in Middle East"},
{front:"Mughal Empire", back:"Islamic empire in India"},
{front:"Qing Dynasty", back:"Last Chinese dynasty"},
{front:"Columbian Exchange", back:"Exchange of goods between Old/New Worlds"},
{front:"Enlightenment", back:"Ideas of reason and rights"},
{front:"French Revolution", back:"Overthrow of French monarchy"},
{front:"Industrial Revolution", back:"Shift to factory production"},
{front:"Capitalism", back:"Private ownership economy"},
{front:"Imperialism", back:"Expansion over foreign lands"},
{front:"Cold War", back:"US vs USSR tension"},
{front:"Decolonization", back:"Colonies gaining independence"},
{front:"Globalization", back:"Worldwide interconnectedness"},
{front:"Neolithic Revolution", back:"Agriculture begins"},
{front:"Renaissance", back:"European cultural rebirth"},
{front:"Reformation", back:"Split in Christianity"},
{front:"Atlantic Slave Trade", back:"Forced African migration"},
{front:"Nationalism", back:"Loyalty to nation"},
{front:"Meiji Restoration", back:"Japan modernization"},
{front:"World War I", back:"Global war 1914–1918"},
{front:"World War II", back:"Global war 1939–1945"},
{front:"United Nations", back:"Global peace organization"},
{front:"Green Revolution", back:"Agricultural innovation"},
{front:"Urbanization", back:"Growth of cities"},
{front:"Feminism", back:"Women’s rights movement"},
{front:"Apartheid", back:"Racial segregation in South Africa"},
{front:"Cold War Proxy Wars", back:"Indirect conflicts US vs USSR"},
{front:"Internet", back:"Global digital communication"},
{front:"Global Trade", back:"Exchange of goods worldwide"},
{front:"Supply and Demand", back:"Economic pricing system"},
{front:"Inflation", back:"Rising prices"},
{front:"Recession", back:"Economic decline"},
{front:"Multinational Corporations", back:"Companies operating globally"}
];

let cIndex=0, flipped=false;

function loadCard(){
  document.getElementById("card").innerText =
    flipped ? cards[cIndex].back : cards[cIndex].front;
}

document.getElementById("card").onclick=()=>{
  flipped=!flipped;
  loadCard();
};

loadCard();

/* =========================
   DBQ GRADER
========================= */
function gradeDBQ(){
  let text = document.getElementById("dbqInput").value.toLowerCase();
  let score = 0;
  let feedback = [];

  if(text.length>80){score++;feedback.push("Good detail");}
  if(text.includes("because")){score++;feedback.push("Reasoning");}
  if(text.includes("factory")){score++;feedback.push("Evidence");}
  if(text.includes("however")){score++;feedback.push("Complexity");}

  document.getElementById("dbqFeedback").innerHTML =
    "Score: " + score + "/4<br>" + feedback.join("<br>");
}

</script>

</body>
</html>
